name: Multiplatform Build (Windows & macOS)


on:
  push:
    branches: [ "main", "master" ] # Сборка запускается при пуше в эти ветки
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        # Запуск параллельных задач на разных виртуальных машинах
        include:
          - os: windows-latest
            artifact_name: survey-app-windows
            output_path: dist/*.exe
            build_command: pyinstaller --onefile --icon=geo.ico main.py

          - os: macos-latest
            artifact_name: survey-app-macos
            output_path: dist/*.app
            build_command: pyinstaller --windowed --onefile --icon=geo.icns main.py

    steps:
    # 1. Скачиваем код репозитория на виртуальную машину
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Устанавливаем Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Устанавливаем зависимости (PyInstaller встроен по умолчанию)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # Если вашему скрипту в будущем понадобятся библиотеки, пишите их сюда:
        # pip install numpy ast

    # 4. Запускаем сборку под конкретную ОС из матрицы
    - name: Build Executable
      run: ${{ matrix.build_command }}

    # 5. Сохраняем полученный результат в артефакты GitHub
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.output_path }}
