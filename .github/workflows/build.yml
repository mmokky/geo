name: Multiplatform Build (Windows & macOS)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: survey-app-windows
            output_path: dist/*.exe
            build_command: pyinstaller --onefile --icon=geo.ico main.py

          - os: macos-latest
            artifact_name: survey-app-macos
            output_path: dist
            build_command: pyinstaller --windowed --onefile --icon=geo.icns main.py

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build Executable
      run: ${{ matrix.build_command }}

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.output_path }}
