name: Multiplatform Build (Windows & macOS)

on:
  push:
    tags:
      - 'v*' # Сборка и релиз будут запускаться только при создании тега версии (например, v1.1.0)

# ГЛОБАЛЬНЫЕ ПРАВА: Разрешаем GitHub Actions создавать и изменять релизы
permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: survey-app-windows
            output_name: main.exe
            output_path: dist/main.exe
            build_command: pyinstaller --onefile --icon=geo.ico main.py
            # Команда расчета хэша для Windows (PowerShell)
            hash_command: |
              $hash = (Get-FileHash ./dist/main.exe -Algorithm SHA256).Hash
              echo $hash > ./dist/checksum_windows.txt
              echo "HASH=$hash" >> $env:GITHUB_ENV

          - os: macos-latest
            artifact_name: survey-app-macos
            output_name: main
            output_path: dist/main
            build_command: pyinstaller --windowed --onefile --icon=geo.icns main.py
            # Команда расчета хэша для macOS (Bash)
            hash_command: |
              hash=$(shasum -a 256 ./dist/main | awk '{print $1}')
              echo $hash > ./dist/checksum_macos.txt
              echo "HASH=$hash" >> $GITHUB_ENV

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build Executable
      run: ${{ matrix.build_command }}

    - name: Generate SHA-256 Hash
      run: ${{ matrix.hash_command }}

    # Загружаем файлы в релиз. Параметр fail_on_unmatched_files выключен, 
    # чтобы Mac не ругался на отсутствие чексумы от Windows и наоборот.
    - name: Create and Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ matrix.output_path }}
          dist/checksum_windows.txt
          dist/checksum_macos.txt
        fail_on_unmatched_files: false
        body: |
          ## Официальные хэши безопасности сборки:
          
          Релиз сгенерирован автоматически. Проверьте контрольную сумму скачанного файла, чтобы убедиться в его оригинальности.
          
          * **ОС:** ${{ matrix.os }}
          * **Файл:** `${{ matrix.output_name }}`
          * **SHA-256 Хэш:** `${{ env.HASH }}`
          
          > ⚠️ **Примечание:** Из-за отсутствия коммерческой цифровой подписи операционные системы (Windows SmartScreen или macOS Gatekeeper) могут выдать предупреждение при первом запуске. Это нормально для независимых open-source проектов.
